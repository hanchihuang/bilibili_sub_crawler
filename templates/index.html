<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>B 站 UP 主字幕爬取</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --muted: #888;
      --accent: #00a1d6;
      --accent-hover: #00b5e8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .tip {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .tip a { color: var(--accent); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn.secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn.secondary:hover { background: #333; }
    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .status.error { color: #f55; }
    .status.success { color: #5a5; }
    .progress-box {
      margin-top: 12px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
    }
    .progress-bar-wrap {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .progress-current {
      font-size: 0.8rem;
      color: var(--accent);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .results { margin-top: 24px; }
    .video-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .video-head {
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .video-head:hover { background: #222; }
    .video-title { font-weight: 500; }
    .video-meta { color: var(--muted); font-size: 0.85rem; }
    .video-body {
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
    }
    .video-body.hide { display: none; }
    .sub-block {
      margin-top: 10px;
      padding: 10px;
      background: var(--bg);
      border-radius: 6px;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }
    .sub-lan { color: var(--accent); font-size: 0.8rem; margin-bottom: 6px; }
    .no-sub { color: var(--muted); font-style: italic; }
    .actions { margin-top: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>B 站 UP 主字幕爬取</h1>
    <p class="tip">
      输入 UP 主的 UID（博主号），可自动爬取该 UP 主全部视频的字幕并导出。UID 在 UP 主空间页地址里，如 <code>space.bilibili.com/<strong>123456</strong></code>。
    </p>
    <div class="card">
      <div class="row">
        <input type="text" id="mid" placeholder="输入 UP 主 UID，例如 123456" />
        <button type="button" class="btn" id="btnCrawl">开始爬取</button>
      </div>
      <div class="status" id="status"></div>
      <div class="progress-box" id="progressBox" style="display: none;">
        <div class="progress-text" id="progressText">正在获取视频列表...</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="progress-current" id="progressCurrent"></div>
      </div>
    </div>
    <div class="results" id="results" style="display: none;">
      <div class="card">
        <div class="row">
          <span class="tip" id="summary"></span>
          <button type="button" class="btn secondary" id="btnExport">导出 ZIP</button>
        </div>
      </div>
      <div id="videoList"></div>
    </div>
  </div>
  <script>
    let lastVideos = [];
    let eventSource = null;
    let sessionId = null;

    const statusEl = document.getElementById("status");
    const progressBox = document.getElementById("progressBox");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    const progressCurrent = document.getElementById("progressCurrent");
    const resultsEl = document.getElementById("results");
    const summaryEl = document.getElementById("summary");
    const videoListEl = document.getElementById("videoList");
    const midEl = document.getElementById("mid");
    const btnCrawl = document.getElementById("btnCrawl");
    const btnExport = document.getElementById("btnExport");

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function updateProgress(data) {
      if (!data) return;
      progressBox.style.display = "block";
      progressText.textContent = data.message || "";
      if (data.total) {
        const pct = Math.round((data.progress / data.total) * 100);
        progressBar.style.width = pct + "%";
        progressText.textContent = data.message + ` (${data.progress}/${data.total})`;
      } else if (data.progress > 0) {
        progressBar.style.width = "30%";
      }
      if (data.current_video) {
        progressCurrent.textContent = data.current_video;
      } else {
        progressCurrent.textContent = "";
      }
    }

    function renderVideos(videos) {
      lastVideos = videos || [];
      if (!videos || !videos.length) {
        videoListEl.innerHTML = "<p class='tip'>暂无字幕数据</p>";
        return;
      }
      let withSub = 0;
      videos.forEach(v => { if ((v.subtitles || []).length) withSub++; });
      summaryEl.textContent = `共 ${videos.length} 个视频，${withSub} 个有字幕。`;
      videoListEl.innerHTML = videos.map((v, i) => {
        const subs = v.subtitles || [];
        const hasSub = subs.length > 0;
        const subHtml = hasSub
          ? subs.map(s => `
            <div class="sub-block">
              <div class="sub-lan">${escapeHtml(s.lan || "未知")}</div>
              <div>${escapeHtml((s.text || "").slice(0, 2000))}${(s.text || "").length > 2000 ? "…" : ""}</div>
            </div>`).join("")
          : "<div class='no-sub'>该视频暂无可用字幕（或需登录后才有）</div>";
        return `
          <div class="video-item">
            <div class="video-head" onclick="this.nextElementSibling.classList.toggle('hide')">
              <span class="video-title">${escapeHtml(v.title || v.bvid)}</span>
              <span class="video-meta">${v.bvid} · ${subs.length ? subs.length + " 条字幕" : "无字幕"}</span>
            </div>
            <div class="video-body">${subHtml}</div>
          </div>`;
      }).join("");
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function startCrawl() {
      const mid = midEl.value.trim();
      if (!mid) {
        setStatus("请填写 UP 主 UID", "error");
        return;
      }

      // 关闭之前的连接
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }

      btnCrawl.disabled = true;
      progressBox.style.display = "block";
      resultsEl.style.display = "none";
      progressBar.style.width = "0%";
      progressCurrent.textContent = "";
      setStatus("正在启动爬取任务...", "");

      fetch("/api/crawl", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mid }),
      }).then(res => res.json()).then(data => {
        if (!data.ok) {
          setStatus(data.error || "启动失败", "error");
          btnCrawl.disabled = false;
          return;
        }
        sessionId = data.session_id;
        setStatus("正在获取视频列表...", "");

        // 使用 EventSource 接收实时进度
        eventSource = new EventSource("/api/progress/" + sessionId);
        eventSource.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            updateProgress(data);

            if (data.status === "done" || data.status === "error") {
              eventSource.close();
              eventSource = null;
              btnCrawl.disabled = false;

              if (data.status === "error") {
                setStatus(data.message || "爬取失败", "error");
              } else if (data.results) {
                setStatus("爬取完成！字幕已保存到: " + (data.saved_dir || ""), "success");
                resultsEl.style.display = "block";
                renderVideos(data.results);
              } else {
                setStatus(data.message || "爬取完成", "success");
              }
            }
          } catch (err) {
            console.error("解析进度数据失败", err);
          }
        };
        eventSource.onerror = () => {
          eventSource.close();
          eventSource = null;
          btnCrawl.disabled = false;
          setStatus("连接中断，请重试", "error");
        };
      }).catch(e => {
        btnCrawl.disabled = false;
        setStatus("网络错误：" + e.message, "error");
      });
    }

    btnCrawl.addEventListener("click", startCrawl);

    // 支持回车触发
    midEl.addEventListener("keypress", (e) => {
      if (e.key === "Enter") startCrawl();
    });

    btnExport.addEventListener("click", async () => {
      if (!lastVideos.length) {
        setStatus("没有可导出的数据", "error");
        return;
      }
      try {
        const res = await fetch("/api/export", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ videos: lastVideos }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          setStatus(err.error || "导出失败", "error");
          return;
        }
        const blob = await res.blob();
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "bilibili_subtitles.zip";
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) {
        setStatus("导出错误：" + e.message, "error");
      }
    });
  </script>
</body>
</html>
